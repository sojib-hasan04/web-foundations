<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
<h1>Checkout</h1>

<section>
    <h2>Your Cart</h2>
    <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="Left-handed spoon">
    <p>Left-handed spoon</p>
    <p>$29.99</p>
</section>

<section>
    <h2>Payment Information</h2>
    <form>
        <label for="card-name">
            Cardholder Name <span aria-hidden="true">*</span>
        </label>
        <input type="text" id="card-name" name="card-name" required />

        <label for="card-number">
            Card Number <span aria-hidden="true">*</span>
        </label>
        <input type="text" id="card-number" name="card-number" aria-describedby="card-number-help" required />

        <p id="card-number-help">Please enter your 16-digit card number without spaces or dashes.</p>

        <label for="expiry-date">
            Expiry Date <span aria-hidden="true">*</span>
        </label>
        <input type="text" id="expiry-date" name="expiry-date" placeholder="MM/YY" required />

        <label for="cvv">
            CVV <span aria-hidden="true">*</span>
        </label>
        <input type="text" id="cvv" name="cvv" required />

        <br />
        <button type="submit">Place Order</button>
    </form>
</section>
</body>
</html>
